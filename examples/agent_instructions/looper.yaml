name: improve-agent-instructions

artifacts:
  - id: agent_instructions
    type: markdown
    path: examples/agent_instructions/instructions/AGENTS.md

runner:
  command: "python examples/agent_instructions/evals/run_eval.py"
  result_path: ".looper/result.json"

metric:
  name: score
  direction: maximize

gates:
  - name: no_unsafe_override
    command: "python examples/agent_instructions/evals/gate_no_unsafe_override.py"

search:
  variants_per_round: 3
  rounds: 1
  selector: best_score_with_gates

mutator:
  provider: stub
