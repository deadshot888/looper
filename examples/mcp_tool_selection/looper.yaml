name: improve-mcp-tool-selection

artifacts:
  - id: crm_mcp_tools
    type: json
    path: examples/mcp_tool_selection/server/tools.json

runner:
  command: "python examples/mcp_tool_selection/evals/run_eval.py"
  result_path: ".looper/result.json"

metric:
  name: score
  direction: maximize

gates:
  - name: valid_mcp_tool_schemas
    command: "python examples/mcp_tool_selection/evals/gate_valid_mcp_tools.py"

search:
  variants_per_round: 3
  rounds: 1
  selector: best_score_with_gates

mutator:
  provider: command
  command: "python examples/mcp_tool_selection/mutators/improve_mcp_tools.py"

workspace:
  # `looper init` creates these example files before they are committed to Git.
  include_untracked: true
