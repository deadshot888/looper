name: improve-tool-schema

artifacts:
  - id: lookup_customer_schema
    type: json
    path: examples/tool_schema/schemas/lookup_customer.json

runner:
  command: "python examples/tool_schema/evals/run_eval.py"
  result_path: ".looper/result.json"

metric:
  name: score
  direction: maximize

gates:
  - name: valid_tool_schema
    command: "python examples/tool_schema/evals/gate_valid_schema.py"

search:
  variants_per_round: 3
  rounds: 1
  selector: best_score_with_gates

mutator:
  provider: command
  command: "python examples/tool_schema/mutators/improve_schema.py"
