name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: python -m ruff check looper tests examples
      - name: Format
        run: python -m ruff format --check looper tests examples
      - name: Type check
        run: python -m mypy looper
      - name: Test
        run: python -m pytest --cov --cov-report=term-missing

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Build
        run: |
          python -m pip install build twine
          python -m build
          python -m twine check dist/*
      - name: Install wheel and smoke test packaged template
        run: |
          python -m pip install dist/*.whl
          mkdir wheel-smoke
          cd wheel-smoke
          looper init --example prompt
          looper run --rounds 1 --variants 1
